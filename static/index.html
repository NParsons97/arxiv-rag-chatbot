<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arXiv RAG Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b22;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header span {
      font-size: 12px;
      color: #8b949e;
    }

    #clear-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    #clear-btn:hover { border-color: #8b949e; color: #e1e4e8; }

    #category-select {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e1e4e8;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s;
      max-width: 260px;
    }
    #category-select:focus { outline: none; border-color: #58a6ff; }
    #category-select option[disabled] { color: #484f58; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message .role {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .message.user .role { color: #58a6ff; }
    .message.assistant .role { color: #3fb950; }
    .message.status .role { color: #8b949e; }

    .message .bubble {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.65;
    }

    .message.user .bubble { background: #1c2d3f; border-color: #1f4068; }
    .message.status .bubble { background: #0d1117; border-color: #21262d; font-size: 13px; color: #8b949e; }

    /* Markdown styles inside bubbles */
    .bubble h1, .bubble h2, .bubble h3 { margin: 14px 0 6px; color: #fff; }
    .bubble p { margin: 8px 0; }
    .bubble ul, .bubble ol { margin: 8px 0 8px 20px; }
    .bubble li { margin: 4px 0; }
    .bubble code {
      background: #0d1117;
      border: 1px solid #30363d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    .bubble pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble pre code { background: none; border: none; padding: 0; }
    .bubble a { color: #58a6ff; }
    .bubble strong { color: #fff; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #3fb950;
      border-radius: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      border-top: 1px solid #21262d;
      padding: 16px 24px;
      background: #161b22;
    }

    #input-row {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 15px;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    #user-input:focus { outline: none; border-color: #58a6ff; }
    #user-input::placeholder { color: #484f58; }

    #send-btn {
      background: #238636;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      height: 48px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    #hint {
      max-width: 780px;
      margin: 8px auto 0;
      font-size: 12px;
      color: #484f58;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #484f58;
    }
    #empty-state h2 { font-size: 22px; color: #8b949e; font-weight: 500; }
    #empty-state p { font-size: 14px; text-align: center; max-width: 400px; line-height: 1.6; }

    .sources-section {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .sources-toggle {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sources-toggle:hover { color: #e1e4e8; }
    .sources-toggle .arrow { transition: transform 0.2s; display: inline-block; }
    .sources-toggle.open .arrow { transform: rotate(90deg); }

    .sources-list { display: none; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
    .sources-list.hidden { display: none; }

    .source-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }
    .source-card-header {
      padding: 10px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
    }
    .source-card-header:hover { background: #1c2128; }
    .source-title {
      font-size: 13px;
      font-weight: 600;
      color: #58a6ff;
      text-decoration: none;
      line-height: 1.4;
    }
    .source-title:hover { text-decoration: underline; }
    .source-meta { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .source-expand-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .source-expand-btn:hover { border-color: #8b949e; color: #e1e4e8; }
    .source-excerpts {
      display: none;
      padding: 0 14px 12px;
      border-top: 1px solid #21262d;
    }
    .source-excerpts.open { display: block; }
    .source-excerpt {
      background: #0d1117;
      border-left: 3px solid #30363d;
      padding: 8px 12px;
      margin-top: 8px;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.6;
      border-radius: 0 4px 4px 0;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>arXiv RAG Chatbot</h1>
    <span>Powered by Ollama · llama3.2:1b</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <select id="category-select">
      <option value="">All subjects</option>
      <optgroup label="Computer Science">
        <option value="cs.AI">cs.AI — Artificial Intelligence</option>
        <option value="cs.CL">cs.CL — Computation and Language</option>
        <option value="cs.CV">cs.CV — Computer Vision</option>
        <option value="cs.LG">cs.LG — Machine Learning</option>
        <option value="cs.RO">cs.RO — Robotics</option>
        <option value="cs.CR">cs.CR — Cryptography and Security</option>
        <option value="cs.DS">cs.DS — Data Structures and Algorithms</option>
        <option value="cs.SE">cs.SE — Software Engineering</option>
        <option value="cs.NE">cs.NE — Neural and Evolutionary Computing</option>
        <option value="cs.IR">cs.IR — Information Retrieval</option>
      </optgroup>
      <optgroup label="Mathematics">
        <option value="math.ST">math.ST — Statistics Theory</option>
        <option value="math.OC">math.OC — Optimization and Control</option>
        <option value="math.PR">math.PR — Probability</option>
        <option value="math.NA">math.NA — Numerical Analysis</option>
        <option value="math.CO">math.CO — Combinatorics</option>
      </optgroup>
      <optgroup label="Physics">
        <option value="astro-ph.CO">astro-ph.CO — Cosmology and Nongalactic Astrophysics</option>
        <option value="astro-ph.EP">astro-ph.EP — Earth and Planetary Astrophysics</option>
        <option value="astro-ph.GA">astro-ph.GA — Astrophysics of Galaxies</option>
        <option value="astro-ph.HE">astro-ph.HE — High Energy Astrophysical Phenomena</option>
        <option value="astro-ph.IM">astro-ph.IM — Instrumentation and Methods for Astrophysics</option>
        <option value="astro-ph.SR">astro-ph.SR — Solar and Stellar Astrophysics</option>
        <option value="cond-mat.mes-hall">cond-mat.mes-hall — Mesoscale and Nanoscale Physics</option>
        <option value="cond-mat.mtrl-sci">cond-mat.mtrl-sci — Materials Science</option>
        <option value="gr-qc">gr-qc — General Relativity and Quantum Cosmology</option>
        <option value="hep-ph">hep-ph — High Energy Physics – Phenomenology</option>
        <option value="hep-th">hep-th — High Energy Physics – Theory</option>
        <option value="quant-ph">quant-ph — Quantum Physics</option>
        <option value="physics.bio-ph">physics.bio-ph — Biological Physics</option>
        <option value="physics.chem-ph">physics.chem-ph — Chemical Physics</option>
      </optgroup>
      <optgroup label="Biology">
        <option value="q-bio.BM">q-bio.BM — Biomolecules</option>
        <option value="q-bio.GN">q-bio.GN — Genomics</option>
        <option value="q-bio.NC">q-bio.NC — Neurons and Cognition</option>
        <option value="q-bio.PE">q-bio.PE — Populations and Evolution</option>
      </optgroup>
      <optgroup label="Statistics">
        <option value="stat.ML">stat.ML — Machine Learning</option>
        <option value="stat.ME">stat.ME — Methodology</option>
        <option value="stat.AP">stat.AP — Applications</option>
      </optgroup>
      <optgroup label="Economics">
        <option value="econ.EM">econ.EM — Econometrics</option>
        <option value="econ.GN">econ.GN — General Economics</option>
        <option value="q-fin.CP">q-fin.CP — Computational Finance</option>
        <option value="q-fin.PM">q-fin.PM — Portfolio Management</option>
      </optgroup>
      <optgroup label="Electrical Engineering">
        <option value="eess.AS">eess.AS — Audio and Speech Processing</option>
        <option value="eess.IV">eess.IV — Image and Video Processing</option>
        <option value="eess.SP">eess.SP — Signal Processing</option>
        <option value="eess.SY">eess.SY — Systems and Control</option>
      </optgroup>
    </select>
    <button id="clear-btn">Clear chat</button>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <h2>Ask about any research topic</h2>
    <p>Type a question or topic below. The chatbot will search arXiv, retrieve relevant papers, and explain them in plain language.</p>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="user-input" placeholder="Ask about a paper or topic…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
  <div id="hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const categorySelect = document.getElementById('category-select');
  const emptyState = document.getElementById('empty-state');

  function updateInputLock() {
    const locked = !categorySelect.value;
    inputEl.disabled = locked;
    sendBtn.disabled = locked;
    inputEl.placeholder = locked
      ? 'Select a subject from the dropdown above to get started…'
      : 'Ask about a paper or topic…';
  }

  categorySelect.addEventListener('change', updateInputLock);
  updateInputLock(); // lock on page load

  let isStreaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', async () => {
    await fetch('/clear', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
  });

  function addMessage(role, content = '', raw = false) {
    emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const roleEl = document.createElement('div');
    roleEl.className = 'role';
    roleEl.textContent = role === 'user' ? 'You' : role === 'assistant' ? 'Assistant' : 'System';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (raw) {
      bubble.innerHTML = content;
    } else {
      bubble.textContent = content;
    }

    wrap.appendChild(roleEl);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);

    // Assistant bubble with cursor
    const bubble = addMessage('assistant', '', true);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    let rawText = '';

    const category = categorySelect.value || null;

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, category }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'status') {
          addMessage('status', data.text);
        } else if (data.type === 'token') {
          rawText += data.text;
          bubble.innerHTML = marked.parse(rawText);
          bubble.appendChild(cursor);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (data.type === 'sources') {
          renderSources(data.sources);
        } else if (data.type === 'done') {
          bubble.innerHTML = marked.parse(rawText);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function renderSources(sources) {
    if (!sources || sources.length === 0) return;

    const section = document.createElement('div');
    section.className = 'sources-section';

    // Toggle button
    const toggle = document.createElement('button');
    toggle.className = 'sources-toggle open';
    toggle.innerHTML = `<span class="arrow">▶</span> ${sources.length} source${sources.length > 1 ? 's' : ''} referenced`;
    section.appendChild(toggle);

    // Cards container
    const list = document.createElement('div');
    list.className = 'sources-list';
    section.appendChild(list);

    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      list.classList.toggle('hidden');
    });

    sources.forEach(src => {
      const card = document.createElement('div');
      card.className = 'source-card';

      const header = document.createElement('div');
      header.className = 'source-card-header';

      const info = document.createElement('div');
      info.innerHTML = `
        <a class="source-title" href="${src.url}" target="_blank" rel="noopener">${src.title}</a>
        <div class="source-meta">${src.authors} · ${src.published}</div>
      `;

      const expandBtn = document.createElement('button');
      expandBtn.className = 'source-expand-btn';
      expandBtn.textContent = 'Show excerpt';

      const excerpts = document.createElement('div');
      excerpts.className = 'source-excerpts';
      src.excerpts.forEach(text => {
        const ex = document.createElement('div');
        ex.className = 'source-excerpt';
        ex.textContent = text + (text.length >= 400 ? '…' : '');
        excerpts.appendChild(ex);
      });

      expandBtn.addEventListener('click', () => {
        const open = excerpts.classList.toggle('open');
        expandBtn.textContent = open ? 'Hide excerpt' : 'Show excerpt';
      });

      header.appendChild(info);
      header.appendChild(expandBtn);
      card.appendChild(header);
      card.appendChild(excerpts);
      list.appendChild(card);
    });

    messagesEl.appendChild(section);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
