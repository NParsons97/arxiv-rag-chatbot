<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arXiv RAG Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b22;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header span {
      font-size: 12px;
      color: #8b949e;
    }

    #clear-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    #clear-btn:hover { border-color: #8b949e; color: #e1e4e8; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message .role {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .message.user .role { color: #58a6ff; }
    .message.assistant .role { color: #3fb950; }
    .message.status .role { color: #8b949e; }

    .message .bubble {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.65;
    }

    .message.user .bubble { background: #1c2d3f; border-color: #1f4068; }
    .message.status .bubble { background: #0d1117; border-color: #21262d; font-size: 13px; color: #8b949e; }

    /* Markdown styles inside bubbles */
    .bubble h1, .bubble h2, .bubble h3 { margin: 14px 0 6px; color: #fff; }
    .bubble p { margin: 8px 0; }
    .bubble ul, .bubble ol { margin: 8px 0 8px 20px; }
    .bubble li { margin: 4px 0; }
    .bubble code {
      background: #0d1117;
      border: 1px solid #30363d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    .bubble pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble pre code { background: none; border: none; padding: 0; }
    .bubble a { color: #58a6ff; }
    .bubble strong { color: #fff; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #3fb950;
      border-radius: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      border-top: 1px solid #21262d;
      padding: 16px 24px;
      background: #161b22;
    }

    #input-row {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 15px;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    #user-input:focus { outline: none; border-color: #58a6ff; }
    #user-input::placeholder { color: #484f58; }

    #send-btn {
      background: #238636;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      height: 48px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    #hint {
      max-width: 780px;
      margin: 8px auto 0;
      font-size: 12px;
      color: #484f58;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #484f58;
    }
    #empty-state h2 { font-size: 22px; color: #8b949e; font-weight: 500; }
    #empty-state p { font-size: 14px; text-align: center; max-width: 400px; line-height: 1.6; }

    .papers-panel {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #8b949e;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .papers-panel strong { color: #e1e4e8; display: block; margin-bottom: 6px; }
    .papers-panel a { color: #58a6ff; text-decoration: none; display: block; margin: 3px 0; }
    .papers-panel a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>arXiv RAG Chatbot</h1>
    <span>Powered by Ollama · llama3.2</span>
  </div>
  <button id="clear-btn">Clear chat</button>
</header>

<div id="messages">
  <div id="empty-state">
    <h2>Ask about any research topic</h2>
    <p>Type a question or topic below. The chatbot will search arXiv, retrieve relevant papers, and explain them in plain language.</p>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="user-input" placeholder="Ask about a paper or topic…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
  <div id="hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const emptyState = document.getElementById('empty-state');

  let isStreaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', async () => {
    await fetch('/clear', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
  });

  function addMessage(role, content = '', raw = false) {
    emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const roleEl = document.createElement('div');
    roleEl.className = 'role';
    roleEl.textContent = role === 'user' ? 'You' : role === 'assistant' ? 'Assistant' : 'System';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (raw) {
      bubble.innerHTML = content;
    } else {
      bubble.textContent = content;
    }

    wrap.appendChild(roleEl);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);

    // Assistant bubble with cursor
    const bubble = addMessage('assistant', '', true);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    let rawText = '';

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'status') {
          addMessage('status', data.text);
        } else if (data.type === 'token') {
          rawText += data.text.replace(/\\n/g, '\n').replace(/\\"/g, '"');
          bubble.innerHTML = marked.parse(rawText);
          bubble.appendChild(cursor);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (data.type === 'done') {
          bubble.innerHTML = marked.parse(rawText);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
